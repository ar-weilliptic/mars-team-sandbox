<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mars Engineering Team</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      color: #fff;
      background: radial-gradient(circle at 30% 20%, #7a1f0f 0%, #4a1005 40%, #1a0602 100%);
      overflow: hidden;
    }
    .banner {
      padding: 2rem;
      max-width: 900px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.15;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }
    p {
      margin-top: 1.25rem;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      opacity: 0.85;
    }
    .team {
      margin-top: 3rem;
      width: 100%;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }
    .team h2 {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 700;
      margin-bottom: 1rem;
      opacity: 0.9;
      text-align: center;
    }
    .team ul { list-style: none; }
    .team li {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 0.5rem;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
    }
    .team .name { font-weight: 600; }
    .team .role { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="banner">
    <h1>Welcome to the Mars Engineering Team Home Page</h1>
    <p>Building the future, one red planet at a time.</p>
    <section class="team">
      <h2>Meet the Team</h2>
      <ul>
        <li><span class="name">Sam Chen</span><span class="role">Junior Engineer</span></li>
        <li><span class="name">Rhea Silvia</span><span class="role">Principal Engineer</span></li>
        <li><span class="name">Bellona Atalanta</span><span class="role">VP Engineering</span></li>
      </ul>
    </section>
  </div>
</body>
</html>
