<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mars Engineering Team</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      color: #fff;
      background: radial-gradient(circle at 30% 20%, #7a1f0f 0%, #4a1005 40%, #1a0602 100%);
      overflow: hidden;
    }
    .banner {
      padding: 2rem;
      max-width: 900px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1.15;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }
    p {
      margin-top: 1.25rem;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="banner">
    <h1>Welcome to the Mars Engineering Team Home Page</h1>
    <p>Building the future, one red planet at a time.</p>
  </div>
</body>
</html>
